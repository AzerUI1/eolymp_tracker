<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" href="https://eolympusercontent.com/images/7fk5pdpbbt1m5bel5288k755nk.png">
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
        <script src="script.js" defer></script>
        <title>Eolymp Account Tracker</title>
    </head>
    <body>
        <header class="site-header">
            <img class="brand-logo" src="https://eolympusercontent.com/images/7fk5pdpbbt1m5bel5288k755nk.png" alt="Eolymp logo">
            <h1 data-i18n="title">Eolymp Account Tracker</h1>
            <div class="search" aria-label="Search Eolymp user">
                <input type="text" placeholder="Enter Eolymp username" aria-label="Eolymp username" data-i18n-placeholder="searchPlaceholder">
                <button type="button" data-i18n="searchButton">Search</button>
            </div>
            <div class="header-controls">
                <select id="languageSelect" class="language-select" aria-label="Language selection">
                    <option value="en">English</option>
                    <option value="az">Azərbaycan</option>
                    <option value="tr">Türkçe</option>
                    <option value="ru">Русский</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="it">Italiano</option>
                    <option value="pt">Português</option>
                    <option value="ar">العربية</option>
                    <option value="ja">日本語</option>
                </select>
                <button class="theme-toggle" type="button" aria-pressed="false" aria-label="Switch to dark theme" data-i18n="themeButtonLight">
                    Dark theme
                </button>
            </div>
        </header>
        <main class="site-main">
            <div id="results" class="results" aria-live="polite"></div>
        </main>
        <footer class="site-footer">
            <p data-i18n="footerMadeBy">Made by Azer Aslanov</p>
            <nav aria-label="Useful links">
                <a href="https://github.com/AzerUI1" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 2a10 10 0 0 0-3.16 19.48c.5.09.68-.22.68-.48v-1.7c-2.77.6-3.36-1.18-3.36-1.18-.46-1.18-1.12-1.49-1.12-1.49-.92-.64.07-.63.07-.63 1.02.07 1.56 1.05 1.56 1.05.91 1.56 2.4 1.11 2.98.85.09-.66.35-1.11.64-1.36-2.21-.25-4.53-1.11-4.53-4.95 0-1.09.39-1.98 1.04-2.68-.1-.26-.45-1.29.1-2.68 0 0 .85-.27 2.8 1.03a9.7 9.7 0 0 1 5.1 0c1.95-1.3 2.8-1.03 2.8-1.03.55 1.39.2 2.42.1 2.68.65.7 1.04 1.59 1.04 2.68 0 3.85-2.33 4.7-4.55 4.94.36.31.68.91.68 1.84v2.72c0 .26.18.57.69.48A10 10 0 0 0 12 2z"/>
                    </svg>
                    <span data-i18n="githubLabel">GitHub</span>
                </a>
                <a href="https://www.instagram.com/number_1_azer/" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.75A4 4 0 0 0 3.75 7.75v8.5a4 4 0 0 0 4 4h8.5a4 4 0 0 0 4-4v-8.5a4 4 0 0 0-4-4h-8.5Zm4.25 2.5A5.75 5.75 0 1 1 6.25 12 5.76 5.76 0 0 1 12 6.25Zm0 1.75A4 4 0 1 0 16 12a4 4 0 0 0-4-4Zm5.9-.95a1.05 1.05 0 1 1-1.05-1.05 1.05 1.05 0 0 1 1.05 1.05Z"/>
                    </svg>
                    <span data-i18n="instagramLabel">Instagram</span>
                </a>
            </nav>
        </footer>
    </body>
</html>
